<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Plane Detection</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
      #canvas { display: block; width: 100vw; height: 100vh; object-fit: cover; }
      #video { display: none; }
      #loading {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: #fff; font-family: sans-serif; font-size: 1.2rem;
        background: #000; gap: 16px;
      }
      #imu-btn {
        display: none;
        padding: 12px 24px;
        font-size: 1rem;
        background: #0078ff;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: sans-serif;
      }
      #imu-btn:active { background: #005acc; }
    </style>
  </head>
  <body>
    <div id="loading">
      <span id="loading-text">OpenCV.js を読み込み中...</span>
      <button id="imu-btn">モーションセンサーを許可</button>
    </div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>new window.VConsole();</script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
